<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Entry: Guy Livne</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: black;
            color: white;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
            overflow: hidden;
        }
        
        canvas {
            display: block;
            position: absolute;
            top: 0;
            left: 0;
            z-index: -1;
        }

        .content {
            z-index: 1;
            background: rgba(0, 0, 0, 0.75);
            padding: 40px;
            border-radius: 10px;
            border: 1px solid #0f0;
            box-shadow: 0 0 20px #0f0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-width: 300px;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
            font-weight: bold;
            color: #0f0;
            text-shadow: 0 0 5px #0f0;
        }
        
        p {
            font-size: 1.2rem;
            margin-bottom: 3rem;
            color: #ccc;
        }
        
        button {
            background-color: transparent;
            color: #0f0;
            border: 2px solid #0f0;
            padding: 15px 40px;
            text-align: center;
            text-decoration: none;
            display: inline-block;
            font-size: 1.2rem;
            font-family: inherit;
            font-weight: bold;
            cursor: pointer;
            border-radius: 5px;
            transition: all 0.3s ease;
            box-shadow: 0 0 10px #0f0 inset, 0 0 10px #0f0;
        }
        
        button:hover {
            background-color: #0f0;
            color: black;
            box-shadow: 0 0 20px #0f0 inset, 0 0 20px #0f0;
        }

        /* --- Loading Bar Styles --- */
        #loadingContainer {
            width: 100%;
            display: none; /* Hidden until button is pressed */
            flex-direction: column;
            align-items: center;
        }

        #loadingText {
            color: #0f0;
            margin-bottom: 10px;
            font-size: 1.1rem;
            font-weight: bold;
            text-shadow: 0 0 5px #0f0;
        }

        #progressBar {
            width: 100%;
            height: 25px;
            border: 2px solid #0f0;
            border-radius: 5px;
            padding: 2px;
            box-sizing: border-box;
            background: rgba(0, 255, 0, 0.1);
            box-shadow: 0 0 10px #0f0;
        }

        #progressFill {
            height: 100%;
            width: 0%;
            background-color: #0f0;
            box-shadow: 0 0 10px #0f0;
        }
    </style>
</head>
<body>

    <canvas id="matrix"></canvas>
    
    <div class="content">
        <h1>System Entry: Guy Livne</h1>
        <p>> Guy Livne has made it home_</p>
        
        <button id="actionBtn">PRESS AND WAIT</button>

        <div id="loadingContainer">
            <div id="loadingText">ESTABLISHING CONNECTION... 0%</div>
            <div id="progressBar">
                <div id="progressFill"></div>
            </div>
        </div>
    </div>

    <script>
        /* --- Matrix Effect JavaScript --- */
        const canvas = document.getElementById('matrix');
        const ctx = canvas.getContext('2d');

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const characters = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789$+-*/=%""\'#&_(),.;:?!\\|{}<>[]^~';
        const fontSize = 16;
        const columns = canvas.width / fontSize;

        const drops = [];
        for (let x = 0; x < columns; x++) {
            drops[x] = 1;
        }

        function drawMatrix() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = '#0F0';
            ctx.font = fontSize + 'px monospace';

            for (let i = 0; i < drops.length; i++) {
                const text = characters.charAt(Math.floor(Math.random() * characters.length));
                ctx.fillText(text, i * fontSize, drops[i] * fontSize);

                if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) {
                    drops[i] = 0;
                }
                drops[i]++;
            }
        }

        setInterval(drawMatrix, 35);

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });

        /* --- Button and Loading Bar Logic --- */
        document.getElementById('actionBtn').addEventListener('click', function() {
            const btn = this;
            const loadingContainer = document.getElementById('loadingContainer');
            const progressFill = document.getElementById('progressFill');
            const loadingText = document.getElementById('loadingText');
            
            // Hide button, show loading bar
            btn.style.display = 'none';
            loadingContainer.style.display = 'flex';
            
            let progress = 0;
            const loadingTime = 2500; // 2.5 seconds total loading time
            const intervalTime = 40; // update speed
            const step = (100 / (loadingTime / intervalTime)); // how much to add per interval

            const interval = setInterval(function() {
                progress += step;
                
                if (progress >= 100) {
                    progress = 100;
                    clearInterval(interval);
                    loadingText.innerText = 'ACCESS GRANTED.';
                    progressFill.style.width = '100%';
                    
                    // Wait half a second after hitting 100% before redirecting
                    setTimeout(function() {
                        window.location.href = 'https://easy.co.il/page/24824077';
                    }, 500);
                } else {
                    loadingText.innerText = 'ESTABLISHING CONNECTION... ' + Math.floor(progress) + '%';
                    progressFill.style.width = progress + '%';
                }
            }, intervalTime);
        });
    </script>

</body>
</html>
